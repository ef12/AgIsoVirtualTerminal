name: Build

on:
  workflow_dispatch:

jobs:
  windows_build:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0
      - name: 'Install NSIS'
        run: |
          choco install nsis -y
          $nsisDir = if (Test-Path "C:\Program Files (x86)\NSIS") { "C:\Program Files (x86)\NSIS" } else { "C:\Program Files\NSIS" }
          echo $nsisDir >> $env:GITHUB_PATH
      - name: Compile
        run: |
          $nsisDir = if (Test-Path "C:\Program Files (x86)\NSIS") { "C:\Program Files (x86)\NSIS" } else { "C:\Program Files\NSIS" }
          $env:PATH = "$nsisDir;$env:PATH"
          mkdir build
          cmake -S . -B build -DBUILD_EXAMPLES=OFF -DBUILD_TESTING=OFF -Wno-dev
          cmake --build build --config Release --target package
      - name: 'Upload Windows Installer'
        uses: actions/upload-artifact@v4
        with:
          name: 'Windows Installer'
          path: build/_CPack_Packages/win64/NSIS/*.exe
