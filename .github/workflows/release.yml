name: Build Release

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure CMake
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DBUILD_PRODUCTION=ON

      - name: Build Release
        run: cmake --build build --config Release

      - name: Package
        run: cd build && cpack -C Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgISOVirtualTerminal-windows
          path: build/AgISOVirtualTerminal-*.exe
